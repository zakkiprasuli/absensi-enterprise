name: CI Pipeline - Absensi Enterprise

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test-fastapi:
    name: Test FastAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies FastAPI
        working-directory: ./absensi-enterprise/ai-fastapi
        run: pip install fastapi uvicorn httpx pytest python-multipart

      - name: Jalankan test FastAPI
        working-directory: ./absensi-enterprise/ai-fastapi
        run: pytest test_main.py -v

  test-laravel:
    name: Test Laravel API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: absensi_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secretpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, bcmath

      - name: Install Composer dependencies
        working-directory: ./absensi-enterprise/backend-laravel
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup environment Laravel
        working-directory: ./absensi-enterprise/backend-laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Jalankan migrasi
        working-directory: ./absensi-enterprise/backend-laravel
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: absensi_test
          DB_USERNAME: admin
          DB_PASSWORD: secretpassword

      - name: Jalankan test Laravel
        working-directory: ./absensi-enterprise/backend-laravel
        run: php artisan test --filter ApiTest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: absensi_test
          DB_USERNAME: admin
          DB_PASSWORD: secretpassword

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-laravel, test-fastapi]

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Build Laravel image
        run: docker build -t absensi-laravel:${{ github.sha }} ./absensi-enterprise/backend-laravel

      - name: Build FastAPI image
        run: docker build -t absensi-fastapi:${{ github.sha }} ./absensi-enterprise/ai-fastapi

      - name: Verifikasi images berhasil dibuat
        run: docker images | grep absensi